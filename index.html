<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта! ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Контейнер для летающих роз */
        .roses-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .rose {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            opacity: 0.6;
            animation: float 12s infinite alternate ease-in-out;
        }

        .rose:nth-child(odd) { font-size: 2rem; animation-duration: 14s; }
        .rose:nth-child(3n) { font-size: 3rem; animation-duration: 10s; }
        .rose:nth-child(5n+2) { animation-delay: -2s; }
        .rose:nth-child(7n+4) { animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(5deg); }
            50% { transform: translate(-20px, 30px) rotate(-3deg); }
            75% { transform: translate(20px, -30px) rotate(8deg); }
            100% { transform: translate(-30px, 20px) rotate(-5deg); }
        }

        /* Карточка с формой */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 120, 160, 0.3),
                        inset 0 2px 8px rgba(255, 255, 255, 0.8);
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
            border: 2px solid rgba(255, 220, 240, 0.5);
        }

        h1 {
            color: #b3406c;
            font-weight: 600;
            font-size: 2.2rem;
            text-shadow: 2px 2px 0 #ffc1d6;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        input, select, button {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        input, select {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.02),
                        0 2px 4px rgba(255, 200, 220, 0.5);
            border: 1px solid #ffb6d1;
            color: #5e3a4a;
        }

        input::placeholder {
            color: #d99cb0;
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23b3406c" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
        }

        button {
            background: #ff8eb5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b34e7a, 0 10px 20px rgba(255, 120, 160, 0.4);
            transform: translateY(-3px);
            border: 2px solid #ffe2f0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #ffa5c5;
            box-shadow: 0 6px 0 #b34e7a, 0 12px 24px rgba(255, 120, 160, 0.5);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b34e7a;
        }

        .output {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 245, 250, 0.7);
            border-radius: 30px;
            font-size: 1.4rem;
            color: #962d5c;
            border: 2px dashed #ffb0cc;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            box-shadow: inset 0 0 20px #ffe2f0;
        }

        /* Canvas для конфетти */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Розы на фоне -->
    <div class="roses-container" id="rosesContainer"></div>

    <!-- Холст для конфетти -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Основная карточка -->
    <div class="card">
        <h1>🌷 Создай поздравление 🌷</h1>
        <input type="text" id="name" placeholder="Имя" autocomplete="off">
        <select id="role">
            <option value="мама">Мама</option>
            <option value="сестра">Сестра</option>
        </select>
        <button onclick="generate()">Создать</button>
        <div id="output" class="output"></div>
    </div>

    <script>
        // === Генерация летающих роз (эмодзи) ===
        (function createRoses() {
            const container = document.getElementById('rosesContainer');
            if (!container) return;
            const count = 30; // количество роз

            for (let i = 0; i < count; i++) {
                const rose = document.createElement('div');
                rose.className = 'rose';
                rose.textContent = '🌹'; // можно заменить на 🌷 или 🌸
                // случайное положение
                rose.style.left = Math.random() * 100 + '%';
                rose.style.top = Math.random() * 100 + '%';
                // случайная задержка анимации для разнообразия
                rose.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(rose);
            }
        })();

        // === Генерация текста поздравления ===
        function generate() {
            const name = document.getElementById('name').value.trim();
            const role = document.getElementById('role').value;

            if (name === '') {
                alert('Пожалуйста, введите имя!');
                return;
            }

            const message = `🌷 Дорогая ${name}! 🌷<br><br>Поздравляю тебя с 8 Марта! Ты самая замечательная ${role} на свете. Желаю тебе весеннего настроения, улыбок, цветов и счастья. Пусть каждый день дарит радость и тепло! 💐`;

            document.getElementById('output').innerHTML = message;

            // Запуск конфетти
            startConfetti();
        }

        // === Конфетти (canvas) ===
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);

        function startConfetti() {
            // Показываем canvas
            canvas.style.display = 'block';
            resizeCanvas();

            // Создаём частицы
            const particleCount = 150;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height - height, // начинаем выше экрана
                    size: Math.random() * 8 + 4,
                    speedY: Math.random() * 5 + 3,
                    speedX: Math.random() * 2 - 1,
                    color: `hsl(${Math.random() * 40 + 320}, 80%, 60%)`, // розово-пурпурные оттенки
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 4
                });
            }

            if (animationId) cancelAnimationFrame(animationId);
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, width, height);

            let anyVisible = false;
            for (let p of particles) {
                p.x += p.speedX;
                p.y += p.speedY;
                p.rotation += p.rotationSpeed;

                // Если частица улетела за нижний край, сбрасываем наверх с новыми координатами
                if (p.y > height + 50) {
                    p.y = -30;
                    p.x = Math.random() * width;
                    p.speedY = Math.random() * 5 + 3;
                }

                if (p.y < height + 50) anyVisible = true;

                // Рисуем конфетти (квадратики, можно заменить на кружки)
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }

            if (anyVisible) {
                animationId = requestAnimationFrame(animateConfetti);
            } else {
                canvas.style.display = 'none';
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        // Принудительно скрываем canvas при загрузке (на всякий случай)
        window.addEventListener('load', () => {
            canvas.style.display = 'none';
        });
    </script>
</body>
</html>
